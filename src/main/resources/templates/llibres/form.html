<!DOCTYPE html>
<!--
  form.html — Formulari per crear o editar un llibre.
  S'utilitza per a les dues operacions: si el llibre té id és una edició,
  si no en té és una creació. El controller decideix a quina URL fa POST.
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ca">

<head>
    <!--
      El títol canvia dinàmicament: "Editar llibre" si ja existeix, "Nou llibre" si és nou.
      L'operador ternari de Thymeleaf: ${condicio} ? 'valor si cert' : 'valor si fals'
    -->
    <th:block th:replace="~{fragments/layout :: head(${llibre.id != null} ? 'Editar llibre' : 'Nou llibre')}"></th:block>
</head>

<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container">

    <div class="page-header">
        <!-- Títol dinàmic del formulari -->
        <h1 th:text="${llibre.id != null} ? 'Editar llibre' : 'Nou llibre'">Formulari</h1>
    </div>

    <!--
      th:action genera la URL d'enviament del formulari de forma dinàmica:
        - Si el llibre ja té id  → POST /llibres/editar/{id}
        - Si és nou              → POST /llibres/nou
      th:object associa el formulari amb l'objecte 'llibre' del model,
      cosa que permet usar *{camp} en lloc de ${llibre.camp} als camps.
    -->
    <form th:action="${llibre.id != null}
                      ? @{/llibres/editar/{id}(id=${llibre.id})}
                      : @{/llibres/nou}"
          th:object="${llibre}"
          method="post"
          class="form-card">

        <!-- ── Títol (obligatori) ──────────────────────────────────────────── -->
        <div class="form-group">
            <label for="titol">Títol <span class="obligatori">*</span></label>
            <!--
              *{titol} és equivalent a ${llibre.titol} quan hi ha th:object.
              th:errorclass afegeix la classe CSS 'is-invalid' si hi ha error de validació.
            -->
            <input type="text" id="titol" th:field="*{titol}"
                   th:errorclass="is-invalid"
                   placeholder="Títol del llibre"/>
            <!-- Mostra el missatge d'error de validació si n'hi ha -->
            <span class="error" th:if="${#fields.hasErrors('titol')}"
                  th:errors="*{titol}">Error títol</span>
        </div>

        <!-- ── Autor (obligatori) ──────────────────────────────────────────── -->
        <div class="form-group">
            <label for="autor">Autor <span class="obligatori">*</span></label>
            <input type="text" id="autor" th:field="*{autor}"
                   th:errorclass="is-invalid"
                   placeholder="Nom de l'autor"/>
            <span class="error" th:if="${#fields.hasErrors('autor')}"
                  th:errors="*{autor}">Error autor</span>
        </div>

        <!-- ── ISBN (opcional) ────────────────────────────────────────────── -->
        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" th:field="*{isbn}"
                   placeholder="Ex: 978-84-204-0038-3"/>
        </div>

        <!-- ── Pàgines (opcional) ─────────────────────────────────────────── -->
        <div class="form-group">
            <label for="pagines">Nombre de pàgines</label>
            <input type="number" id="pagines" th:field="*{pagines}"
                   min="1" placeholder="Ex: 320"/>
        </div>

        <!-- ── Idioma (opcional) ──────────────────────────────────────────── -->
        <div class="form-group">
            <label for="idioma">Idioma</label>
            <input type="text" id="idioma" th:field="*{idioma}"
                   placeholder="Ex: Català, Castellà, Anglès"/>
        </div>

        <!-- ── Any de publicació (opcional) ──────────────────────────────── -->
        <div class="form-group">
            <label for="anyPublicacio">Any de publicació</label>
            <input type="number" id="anyPublicacio" th:field="*{anyPublicacio}"
                   min="1000" max="2100" placeholder="Ex: 2023"/>
        </div>

        <!-- ── Categories (multiselect, opcional) ────────────────────────── -->
        <div class="form-group">
            <label for="categories">Categories</label>
            <!--
              Select múltiple: l'usuari pot seleccionar diverses categories.
              th:each genera una <option> per a cada categoria disponible.
              th:selected comprova si la categoria ja estava assignada al llibre (per a l'edició).
            -->
            <select id="categories" name="categories" multiple class="multiselect">
                <option th:each="cat : ${toutesCategories}"
                        th:value="${cat.id}"
                        th:text="${cat.nom}"
                        th:selected="${llibre.categories != null and llibre.categories.contains(cat)}">
                    Categoria
                </option>
            </select>
            <small>Mantén premuda Ctrl (o Cmd al Mac) per seleccionar diverses categories.</small>
        </div>

        <!-- ── Botons d'acció ─────────────────────────────────────────────── -->
        <div class="form-actions">
            <!-- Botó d'enviament del formulari -->
            <button type="submit" class="btn">Desar</button>
            <!-- Botó per cancel·lar i tornar al llistat sense guardar -->
            <a th:href="@{/llibres}" class="btn btn-secondary">Cancel·lar</a>
        </div>

        <!-- Nota dels camps obligatoris -->
        <p class="nota-obligatori"><span class="obligatori">*</span> Camps obligatoris</p>

    </form>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
